<script>

const API_FILE = "apps.json";
let apps = [];

// LOAD APPS FROM BACKEND
async function loadApps(){

const res = await fetch(API_FILE);
const data = await res.json();

apps = data.apps;

renderStore();

}

function renderStore(list = apps) {

  const grid = document.getElementById('appGrid');
  grid.innerHTML = '';

  list.forEach((app, i) => {

    const card = document.createElement('div');
    card.className = 'app-card';

    card.innerHTML = `

      <img src="${app.image}" class="app-icon">

      <div class="app-info">
        <div class="app-name">${app.name}</div>
        <div class="app-meta">${app.tag} • 4.9 ★</div>

        <button class="install-btn"
        onclick="window.open('${app.link}')">
        Install
        </button>

      </div>

      <button class="qr-btn"
      onclick="openQR(${i})">📷</button>

    `;

    grid.appendChild(card);

  });

}


// ADMIN LOGIN

let clicks = 0;

document.getElementById('logoBtn').onclick = () => {

clicks++

if(clicks <= 5)
document.getElementById(`d${clicks}`).classList.add('active')

if(clicks === 5){

clicks = 0

setTimeout(()=>{

document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'))

document.getElementById('pwOverlay').classList.remove('hidden')

},400)

}

}


document.getElementById('pwSubmit').onclick = () => {

if(document.getElementById('pwInput').value === "useasstore"){

document.getElementById('pwOverlay').classList.add('hidden')
document.getElementById('adminOverlay').classList.remove('hidden')

}else{

alert("Wrong Password")

}

}



// ADMIN ADD APP (GENERATE JSON)

document.getElementById('addAppBtn').onclick = () => {

const name = document.getElementById('aName').value
const image = document.getElementById('aImage').value
const link = document.getElementById('aLink').value
const tag = document.getElementById('aTag').value
const desc = document.getElementById('aDesc').value

const jsonCode =

`{
"name":"${name}",
"tag":"${tag}",
"link":"${link}",
"image":"${image}",
"desc":"${desc}"
},`

alert("Copy this code and paste inside apps.json")

console.log(jsonCode)

prompt("Copy this JSON and add to apps.json",jsonCode)

}



// QR SYSTEM

window.openQR = (i)=>{

const app = apps[i]

document.getElementById('qrAppName').textContent = app.name

const container = document.getElementById('qr-container')

container.innerHTML = ""

new QRCode(container,{
text: app.link,
width:160,
height:160
})

document.getElementById('qrOverlay').classList.remove('hidden')

}


// SEARCH

document.getElementById('searchInput').oninput = (e)=>{

const term = e.target.value.toLowerCase()

renderStore(apps.filter(a =>
a.name.toLowerCase().includes(term)
))

}


// START
loadApps()

</script>
